services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: meridian_app
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - db
      - redis
    networks:
      - meridian

  nginx:
    image: nginx:1.25-alpine
    container_name: meridian_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - meridian

  db:
    image: postgres:16-alpine
    container_name: meridian_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-meridian}
      POSTGRES_USER: ${DB_USERNAME:-meridian}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - meridian

  redis:
    image: redis:7-alpine
    container_name: meridian_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - meridian

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: meridian_horizon
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
      - redis
    networks:
      - meridian

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: meridian_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
      - redis
    networks:
      - meridian

  minio:
    image: minio/minio
    container_name: meridian_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-meridian}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-secret123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - meridian

  mailpit:
    image: axllent/mailpit
    container_name: meridian_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - meridian

  vite:
    image: node:22-alpine
    container_name: meridian_vite
    restart: unless-stopped
    working_dir: /app
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    networks:
      - meridian
    profiles:
      - dev

networks:
  meridian:
    driver: bridge

volumes:
  db_data:
  redis_data:
  minio_data:
